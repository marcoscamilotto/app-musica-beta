<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>App Música Beta</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:50px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#resultado{
margin-top:20px;
white-space:pre-wrap;
}
</style>

</head>

<body>

<h1>Transcrever Áudio 🎤</h1>

<input type="file" id="audioFile" accept="audio/*">
<br><br>

<button onclick="enviarAudio()">Transcrever</button>

<div id="resultado"></div>

<script>

async function enviarAudio(){

const input = document.getElementById("audioFile")
const file = input.files[0]

if(!file){
alert("Selecione um arquivo")
return
}

const formData = new FormData()
formData.append("audio", file)

document.getElementById("resultado").innerText = "Transcrevendo..."

try{

const response = await fetch("/api/transcrever",{
method:"POST",
body:formData
})

const data = await response.json()

document.getElementById("resultado").innerText = data.text

}catch(error){

document.getElementById("resultado").innerText = "Erro ao transcrever"

}

}

</script>

</body>
</html>
