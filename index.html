<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App Música Beta</title>
</head>
<body>

  <h1>🎵 App Música Beta</h1>
  <p>Envie sua música e gere a letra automaticamente.</p>

  <input type="file" id="audioFile">
  <button onclick="enviarAudio()">Enviar Áudio</button>

  <pre id="resultado"></pre>

  <script>
   <script>
async function enviarAudio() {
  const input = document.getElementById("audioFile");
  const file = input.files[0];

  if (!file) {
    alert("Selecione um arquivo");
    return;
  }

  const formData = new FormData();
  formData.append("audio", file);

  const response = await fetch("/api/transcrever", {
    method: "POST",
    body: formData,
  });

  const data = await response.json();

  if (data.text) {
    document.getElementById("resultado").innerText = data.text;
  } else {
    console.error(data);
    alert("Erro na transcrição");
  }
}
</script>
