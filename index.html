<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App Música Beta</title>
</head>
<body>

  <h1>🎵 App Música Beta</h1>
  <p>Envie sua música e gere a letra automaticamente.</p>

  <input type="file" id="audioFile">
  <button onclick="enviarAudio()">Enviar Áudio</button>

  <p id="status"></p>

  <!-- Biblioteca Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://wugkwzmlgsohabibsxhn.supabase.co";
    const supabaseKey = "sb_publishable_sWmFk7EG7GR6PWsw5S_gnw_9wSOPYHL";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function enviarAudio() {
      const fileInput = document.getElementById("audioFile");
      const status = document.getElementById("status");

      if (!fileInput.files.length) {
        alert("Selecione um arquivo primeiro!");
        return;
      }

      const file = fileInput.files[0];
      status.innerText = "Enviando...";

      const { data, error } = await supabase.storage
        .from("audios")
        .upload(Date.now() + "_" + file.name, file);

      if (error) {
        console.error(error);
        status.innerText = "Erro ao enviar!";
      } else {
        status.innerText = "Upload concluído!";
      }
    }
  </script>

</body>
</html>
