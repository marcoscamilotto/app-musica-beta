<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App Música Beta</title>
</head>
<body>

  <h1>🎵 App Música Beta</h1>
  <p>Envie sua música e gere a letra automaticamente.</p>

  <input type="file" id="audioFile">
  <button onclick="enviarAudio()">Enviar Áudio</button>

  <p id="resultado"></p>

  <script>
   async function enviarAudio() {
  const input = document.querySelector("input[type=file]");
  const file = input.files[0];

  if (!file) {
    alert("Selecione um arquivo");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("model", "gpt-4o-mini-transcribe");

  const response = await fetch("https://api.openai.com/v1/audio/transcriptions", {
    method: "POST",
    headers: {
      Authorization: "Bearer SUA_CHAVE_AQUI",
    },
    body: formData,
  });

  const data = await response.json();

  if (data.text) {
    document.getElementById("resultado").innerText = data.text;
  } else {
    console.error(data);
    alert("Erro na transcrição");
  }
}
    }
  </script>

</body>
</html>
