<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App Música Beta</title>
</head>
<body>

  <h1>🎵 App Música Beta</h1>
  <p>Envie sua música e gere a letra automaticamente.</p>

  <input type="file" id="audioFile">
  <button onclick="enviarAudio()">Enviar Áudio</button>

  <p id="status"></p>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://wugkwzmlgsohabibsxhn.supabase.co";
    const supabaseKey = "sb_publishable_sWmFk7EG7GR6PWsw5S_gnw_9wSOPYHL";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function enviarAudio() {
      const fileInput = document.getElementById("audioFile");
      const status = document.getElementById("status");

      if (!fileInput.files.length) {
        alert("Selecione um arquivo primeiro!");
        return;
      }

      const file = fileInput.files[0];
      status.innerText = "Enviando...";

      const { data, error } = await client.storage
        .from("audios")
        .upload(Date.now() + "_" + file.name, file);

      if (error) {
        console.error(error);
        status.innerText = "Erro ao enviar!";
      } else {
        status.innerText = "Upload concluído!";
      }
    }
  </script>
<script>
async function enviarAudio(audioBlob) {
  const response = await fetch("/api/transcrever", {
    method: "POST",
    body: audioBlob,
  });

  const data = await response.json();

  if (data.text) {
    document.getElementById("resultado").innerText = data.text;
  } else {
    document.getElementById("resultado").innerText = "Erro ao transcrever.";
  }
}
</script>
</body>
</html><div id="resultado"></div>
