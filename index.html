<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App Música Beta</title>
</head>
<body>

  <h1>🎵 App Música Beta</h1>
  <p>Envie sua música e gere a letra automaticamente.</p>

  <input type="file" id="audioFile">
  <button onclick="enviarAudio()">Enviar Áudio</button>

  <pre id="resultado"></pre>

  <script>
    async function enviarAudio() {
      const input = document.getElementById("audioFile");
      const file = input.files[0];

      if (!file) {
        alert("Selecione um arquivo");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);
      formData.append("model", "gpt-4o-mini-transcribe");

      const response = await fetch("https://api.openai.com/v1/audio/transcriptions", {
        method: "POST",
        headers: {
          Authorization: "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"
        },
        body: formData,
      });

      const data = await response.json();

      if (data.text) {
        document.getElementById("resultado").innerText = data.text;
      } else {
        console.error(data);
        alert("Erro na transcrição");
      }
    }
  </script>

</body>
</html>
