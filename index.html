<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>App Música Beta</title>
</head>

<body>

<h1>🎵 App Música Beta</h1>
<p>Envie sua música e gere a letra automaticamente.</p>

<input type="file" id="audioFile" name="audio">
<button onclick="enviarAudio()">Enviar Áudio</button>

<pre id="resultado"></pre>

<script>

async function enviarAudio() {

const input = document.getElementById("audioFile")
const file = input.files[0]

if (!file) {
alert("Selecione um arquivo")
return
}

const formData = new FormData()
formData.append("audio", file)

document.getElementById("resultado").textContent = "Enviando áudio..."

try {

const response = await fetch("/api/transcrever", {
method: "POST",
body: formData
})

const data = await response.json()

document.getElementById("resultado").textContent = data.texto

} catch (erro) {

document.getElementById("resultado").textContent = "Erro ao enviar áudio"

}

}

</script>

</body>
</html>
