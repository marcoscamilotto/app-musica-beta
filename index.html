<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App Música Beta</title>
</head>
<body>

  <h1>🎵 App Música Beta</h1>
  <p>Envie sua música e gere a letra automaticamente.</p>

  <input type="file" id="audioFile">
  <button onclick="enviarAudio()">Enviar Áudio</button>

  <p id="resultado"></p>

  <script>
    async function enviarAudio() {
      const fileInput = document.getElementById("audioFile");
      const resultado = document.getElementById("resultado");

      if (!fileInput.files.length) {
        alert("Escolha um arquivo primeiro!");
        return;
      }

      const formData = new FormData();
      formData.append("audio", fileInput.files[0]);

      resultado.innerText = "Transcrevendo...";

      try {
        const response = await fetch("/api/transcrever", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (response.ok) {
          resultado.innerText = data.texto;
        } else {
          resultado.innerText = "Erro: " + data.error;
        }

      } catch (error) {
        resultado.innerText = "Erro ao enviar áudio.";
      }
    }
  </script>

</body>
</html>
